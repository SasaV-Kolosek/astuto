default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { ENV.fetch("POSTGRES_HOST", "db") } %>
  username: <%= ENV['DB_USERNAME'] || ENV['POSTGRES_USER'] %>
  password: <%= ENV['DB_PASSWORD'] || ENV['POSTGRES_PASSWORD'] %>

development:
  <<: *default
  database: <%= ENV['POSTGRES_USER'] %>

test:
  <<: *default
  database: <%= ENV['POSTGRES_USER'] %>_test
  
production:
  <<: *default
  database: <%= ENV['POSTGRES_USER'] %>